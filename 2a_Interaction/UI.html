<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="Styles/styles.css">
    <script type="module" src="extension.js"></script>
  </head>
  <body>
    <h2>
      <img src="raven.svg" alt="">
      GOT Assistant
    </h2>

    <form id="Prompt-Form" data-bind="submit: sentPromptToServer, hidden: isLoading">

      <div class="field">
        <label for="gemini-key">Gemini Key</label>
        <input id="gemini-key" type="text" placeholder="Enter Gemini key…"
               data-bind="textInput: GeminiKey">
      </div>

      <div class="field">
        <label for="prompt">Question</label>
        <input id="prompt" type="text" placeholder="Enter prompt…"
               data-bind="textInput: Prompt">
      </div>

      <div class="field">
        <label for="prompt-type">Advice Type</label>
        <select id="prompt-type" data-bind="value: PromptType">
          <option value="combat">Combat</option>
          <option value="track-bid">Track Bid</option>
          <option value="wildling-bid">Wildling Bid</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="field">
        <label for="model">Model</label>
        <select id="model" data-bind="value: Model">
          <option value="gemini-2.0-flash">Flash 2.0 (free)</option>
          <option value="gemini-2.5-pro">Pro 2.5</option>
        </select>
      </div>

      <div class="field" data-bind="visible: AdvancedMode">
        <label for="ai-retrieval-type">Retrieval Type</label>
        <select id="ai-retrieval-type" data-bind="value: AIRetrievalType">
          <option value="rag">RAG</option>
          <!-- <option value="few-shot">Few Shot</option> -->
          <option value="zero-shot">Zero Shot</option>
        </select>
      </div>

      <div class="field" data-bind="visible: AdvancedMode">
        <label for="retrieval-amount">Retrieval Amount</label>
        <input id="retrieval-amount" type="number" min="1" placeholder="Default"
               data-bind="textInput: RetrievalAmount">
      </div>

      <div class="raw-mode-row" data-bind="visible: AdvancedMode">
        <input id="no-context" type="checkbox" data-bind="checked: NoContext">
        <label for="no-context">No Context</label>
      </div>

      <div class="raw-mode-row">
        <input id="advanced-mode" type="checkbox" data-bind="checked: AdvancedMode">
        <label for="advanced-mode">Advanced</label>
        <input id="raw-mode" type="checkbox" data-bind="checked: RawMode, visible: AdvancedMode">
        <label for="raw-mode" data-bind="visible: AdvancedMode">Raw Mode</label>
        <button id="download-button" type="button" class="icon-label-btn" data-bind="click: downloadGameData, visible: AdvancedMode">
          <img src="Download.svg" alt="">Game
        </button>
      </div>

      <!-- Only visible when RawMode is true -->
      <div class="field" data-bind="visible: RawMode">
        <label for="raw-json">Raw JSON</label>
        <textarea id="raw-json" placeholder="Paste raw JSON here…"
                  data-bind="textInput: RawJSON"></textarea>
      </div>

      <!-- Error message banner -->
      <div class="error" data-bind="visible: ErrorMessage, text: ErrorMessage"></div>

      <button type="submit" data-bind="click: sentPromptToServer">Submit</button>

    </form>

    <div class="" data-bind="visible: isLoading">Loading...</div>

    <!-- Response panel — only visible once a reply arrives -->
    <section class="response-panel" data-bind="visible: Response">
      <h3 class="response-heading">Response</h3>
      <div class="response-body" data-bind="safeMarkdown: Response"></div>
      <div class="token-usage" data-bind="visible: TokensIn">
        <span data-bind="text: 'In: ' + TokensIn()"></span>
        <span data-bind="text: 'Out: ' + TokensOut()"></span>
      </div>
    </section>

  </body>
</html>
